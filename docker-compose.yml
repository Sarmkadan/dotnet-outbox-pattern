services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: outbox-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SA_PASSWORD:-YourStrongPassword123!}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - outbox-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD:-YourStrongPassword123!}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: outbox-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >-
        Server=sqlserver;Database=OutboxPattern;User Id=sa;Password=${SA_PASSWORD:-YourStrongPassword123!};Encrypt=false;TrustServerCertificate=true
      Outbox__ProcessorEnabled: "true"
      Outbox__BatchSize: "100"
      Outbox__DelayBetweenBatches: "5000"
      Outbox__MaxRetries: "5"
      Outbox__RetryPolicy: "ExponentialBackoff"
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - outbox-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: outbox-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - outbox-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

networks:
  outbox-network:
    driver: bridge

volumes:
  sqlserver-data:
  redis-data: